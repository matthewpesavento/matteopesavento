<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matthew Pesavento — CV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f4f4f1;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #05287a;
      color: white;
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.03em;
    }

    header a.back {
      color: #aac4f0;
      text-decoration: none;
      font-size: 0.9rem;
    }

    header a.back:hover { text-decoration: underline; }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .toolbar span {
      font-size: 0.85rem;
      color: #666;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #05287a;
      color: white;
      padding: 0.5rem 1.1rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #073fa8; }

    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    iframe {
      flex: 1;
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      background: white;
    }

    .error {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #555;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.78rem;
      color: #999;
    }
  </style>
</head>
<body>

  <header>
    <h1>Matthew Pesavento &mdash; Curriculum Vitae</h1>
    <a class="back" href="/professional/">← Professional</a>
  </header>

  <div class="toolbar">
    <span id="updated-label">Loading latest version…</span>
    <a id="download-btn" class="download-btn" href="#" download="Pesavento_CV.pdf">
      ↓ Download PDF
    </a>
  </div>

  <div class="viewer">
    <div class="error" id="error-box">
      The CV PDF could not be loaded. It may still be compiling — try refreshing in a minute.
    </div>
    <iframe id="pdf-frame" title="Matthew Pesavento CV"></iframe>
  </div>

  <footer>
    Auto-generated from <a href="https://github.com/matthewpesavento/matteopesavento/tree/main/professional/cv" target="_blank">LaTeX source</a> via GitHub Actions
  </footer>

  <script>
    // Cache-busting: append timestamp so browsers always fetch the latest PDF
    const pdfBase = "https://raw.githubusercontent.com/matthewpesavento/matteopesavento/main/professional/cv.pdf";
    const pdfUrl  = pdfBase + "?t=" + Date.now();

    const frame      = document.getElementById("pdf-frame");
    const dlBtn      = document.getElementById("download-btn");
    const label      = document.getElementById("updated-label");
    const errorBox   = document.getElementById("error-box");

    // Set iframe and download link
    frame.src   = pdfUrl;
    dlBtn.href  = pdfUrl;

    // Fetch commit metadata to show "Last updated" time
    fetch("https://api.github.com/repos/matthewpesavento/matteopesavento/commits?path=professional/cv.pdf&per_page=1")
      .then(r => r.json())
      .then(data => {
        if (data && data[0]) {
          const date = new Date(data[0].commit.committer.date);
          label.textContent = "Last updated: " + date.toLocaleDateString("en-US", {
            year: "numeric", month: "long", day: "numeric"
          });
        } else {
          label.textContent = "";
        }
      })
      .catch(() => { label.textContent = ""; });

    // Show error message if PDF fails to load
    frame.addEventListener("error", () => {
      errorBox.style.display = "block";
    });
  </script>

</body>
</html>
