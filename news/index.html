<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e85d04'/><text x='50' y='68' text-anchor='middle' font-family='sans-serif' font-size='52' font-weight='800' fill='white'>P</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic — Matteo Pesavento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/nav.css">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface2: #f3f0eb;
    --border: #e8e2d9;
    --text: #1a1714;
    --muted: #8a8178;
    --accent: #c8392b;
    --accent2: #2e5fa3;
    --gold: #b8860b;
    --green: #2d6a4f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }

  .page-wrap { max-width: 860px; margin: 0 auto; padding: 40px 48px 80px; }

  /* ── Header ── */
  .page-header { margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
  .page-title span { color: var(--accent); }
  .page-subtitle { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.spinning .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
  .filter-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }

  .pill { font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 11px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; letter-spacing: 0.4px; transition: all 0.15s; white-space: nowrap; }
  .pill:hover { border-color: var(--text); color: var(--text); }
  .pill.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* ── Status bar ── */
  .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-size: 11px; color: var(--muted); }
  .status-count { }
  .status-ts { font-style: italic; }

  /* ── Article list ── */
  .article-list { display: flex; flex-direction: column; gap: 0; }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0;
    border-bottom: none;
    transition: background 0.15s;
    cursor: pointer;
  }

  .article-card:first-child { border-radius: 14px 14px 0 0; }
  .article-card:last-child  { border-radius: 0 0 14px 14px; border-bottom: 1px solid var(--border); }
  .article-card:only-child  { border-radius: 14px; border-bottom: 1px solid var(--border); }
  .article-card:hover { background: var(--surface2); }
  .article-card.expanded { background: var(--surface); }
  .article-card.expanded:hover { background: var(--surface); }

  .card-main { padding: 16px 22px; display: flex; gap: 14px; align-items: flex-start; }

  .journal-pip {
    flex-shrink: 0;
    width: 4px;
    height: 100%;
    border-radius: 2px;
    align-self: stretch;
    min-height: 40px;
  }

  .card-content { flex: 1; min-width: 0; }

  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }

  .journal-tag {
    font-size: 9px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .card-date { font-size: 10px; color: var(--muted); }
  .card-authors { font-size: 10px; color: var(--muted); }

  .card-title-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-expand-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-expand-hint .arrow { transition: transform 0.2s; display: inline-block; }
  .article-card.expanded .card-expand-hint .arrow { transform: rotate(180deg); }

  /* ── Abstract panel ── */
  .abstract-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.2s ease;
    opacity: 0;
  }

  .abstract-panel.open {
    max-height: 600px;
    opacity: 1;
  }

  .abstract-inner {
    padding: 0 22px 18px 40px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .abstract-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 8px;
  }

  .abstract-text {
    font-family: 'Libre Baskerville', serif;
    font-size: 12.5px;
    line-height: 1.8;
    color: var(--text);
  }

  .abstract-footer {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .abstract-link {
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    color: var(--accent2);
    text-decoration: none;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .abstract-link:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .abstract-link.primary { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .abstract-link.primary:hover { opacity: 0.85; }

  /* ── Loading / empty ── */
  .loading-wrap { padding: 60px 0; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .dot-pulse { display: flex; gap: 5px; }
  .dot-pulse span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s ease-in-out infinite; }
  .dot-pulse span:nth-child(2) { animation-delay: .2s; }
  .dot-pulse span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  .loading-msg { font-size: 12px; color: var(--muted); font-style: italic; }

  .empty-msg { padding: 48px 0; text-align: center; font-size: 12px; color: var(--muted); font-style: italic; }
  .error-msg  { padding: 20px; font-size: 12px; color: var(--accent); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }

  /* ── Footer ── */
  .footer-row { margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  @media (max-width: 640px) {
    .page-wrap { padding: 24px 20px 60px; }
    .page-title { font-size: 24px; }
    .card-authors { max-width: 180px; }
  }
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">🔬 Academic<span>.</span></div>
      <div class="page-subtitle">Latest papers from NBER · JAMA · AER · AEJ (Applied, Policy, Macro, Micro) · Health Econ · QJE · REStat · ASCO — click any paper to read the abstract</div>
    </div>
    <div class="header-actions">
      <button class="btn" id="refreshBtn" onclick="loadAll()"><span class="spin">↻</span> Refresh</button>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Journal</span>
    <div id="filterPills"></div>
  </div>

  <div class="status-bar">
    <span class="status-count" id="statusCount"></span>
    <span class="status-ts"   id="statusTs"></span>
  </div>

  <div id="articleContainer"></div>

  <div class="footer-row">
    <span>Papers via RSS — NBER, JAMA, AER, JHE, QJE, REStat, JCO (ASCO)</span>
    <span>Abstracts from RSS feed where available</span>
  </div>
</div>

<script>
const WORKER = 'https://matteo-plan.mtpesavento.workers.dev';

// ── Source definitions ────────────────────────────────────────
// type: 'rss'    — standard RSS/Atom feed via Worker proxy
// type: 'aea'    — scrape AEA search-results page (journal= param)
// type: 'nber'   — NBER JSON API

const JOURNALS = [
  {
    id: 'nber', label: 'NBER', color: '#185FA5', bg: '#ddeeff',
    type: 'nber',
  },
  {
    id: 'jama', label: 'JAMA', color: '#993C1D', bg: '#fde8e0',
    type: 'rss',
    feeds: [
      'https://jamanetwork.com/rss/site_3/67.xml',
      'https://jamanetwork.com/rss/site_3/68.xml',
    ],
  },
  {
    id: 'aer',   label: 'AER',           color: '#3C3489', bg: '#eeedfe', type: 'aea', journalId: '1' },
  { id: 'aej-app', label: 'AEJ Applied', color: '#4a2d80', bg: '#f0e8fc', type: 'aea', journalId: '4' },
  { id: 'aej-pol', label: 'AEJ Policy',  color: '#5a2060', bg: '#f5e8f8', type: 'aea', journalId: '6' },
  { id: 'aej-mac', label: 'AEJ Macro',   color: '#2d4080', bg: '#e8eeff', type: 'aea', journalId: '5' },
  { id: 'aej-mic', label: 'AEJ Micro',   color: '#203560', bg: '#e8f0ff', type: 'aea', journalId: '7' },
  {
    id: 'jhe', label: 'Health Econ', color: '#0F6E56', bg: '#e0f5ee',
    type: 'rss',
    feeds: ['https://rss.sciencedirect.com/publication/science/01676296'],
  },
  {
    id: 'qje', label: 'QJE', color: '#854F0B', bg: '#faedda',
    type: 'rss',
    feeds: ['https://academic.oup.com/rss/site_6123/advanceAccess_6123.xml'],
  },
  {
    id: 'restat', label: 'REStat', color: '#5C3070', bg: '#f0e8fa',
    type: 'rss',
    feeds: ['https://direct.mit.edu/rss/journals/rest'],
  },
  {
    id: 'asco', label: 'JCO/ASCO', color: '#1a6b3c', bg: '#e0f5ea',
    type: 'rss',
    feeds: ['https://ascopubs.org/action/showFeed?type=etoc&feed=rss&jc=jco'],
  },
];

// ── State ─────────────────────────────────────────────────────
let allArticles  = [];   // flat sorted list
let activeFilter = 'all';
let expandedId   = null;
let loading      = true;
let errors       = [];

// ── Fetch ─────────────────────────────────────────────────────
function proxyUrl(u) {
  return `${WORKER}/proxy?url=${encodeURIComponent(u)}`;
}

function stripHtml(html) {
  if (!html) return '';
  return html
    .replace(/<[^>]+>/g, ' ')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function parseXML(text) {
  return new DOMParser().parseFromString(text, 'text/xml');
}

function getText(el, sel) {
  return el.querySelector(sel)?.textContent?.trim() || '';
}

function parseRSSItems(doc, journalId) {
  const journal = JOURNALS.find(j => j.id === journalId);
  const items   = [];

  // Try RSS 2.0 items first
  doc.querySelectorAll('channel > item').forEach(item => {
    const title    = stripHtml(getText(item, 'title'));
    const link     = getText(item, 'link') || item.querySelector('guid')?.textContent?.trim() || '';
    const dateStr  = getText(item, 'pubDate') || getText(item, 'dc\\:date') || '';
    const abstract = stripHtml(
      getText(item, 'description') ||
      getText(item, 'content\\:encoded') ||
      getText(item, 'summary') || ''
    );
    // Authors: dc:creator, author, or nothing
    const authors  = stripHtml(
      getText(item, 'dc\\:creator') ||
      getText(item, 'author') || ''
    );
    if (!title) return;
    items.push({ id: `${journalId}-${link}`, journalId, journal, title, link, dateStr, abstract, authors });
  });

  if (items.length) return items;

  // Atom entries fallback
  doc.querySelectorAll('entry').forEach(entry => {
    const title    = stripHtml(getText(entry, 'title'));
    const link     = entry.querySelector('link[rel="alternate"]')?.getAttribute('href')
                  || entry.querySelector('link')?.getAttribute('href') || '';
    const dateStr  = getText(entry, 'published') || getText(entry, 'updated') || '';
    const abstract = stripHtml(getText(entry, 'summary') || getText(entry, 'content') || '');
    const authors  = Array.from(entry.querySelectorAll('author > name'))
                      .map(n => n.textContent.trim()).join(', ');
    if (!title) return;
    items.push({ id: `${journalId}-${link}`, journalId, journal, title, link, dateStr, abstract, authors });
  });

  return items;
}

async function fetchRSSJournal(journal) {
  for (const feedUrl of journal.feeds || []) {
    try {
      const res = await fetch(proxyUrl(feedUrl));
      if (!res.ok) continue;
      const text = await res.text();
      const doc  = parseXML(text);
      if (doc.querySelector('parsererror')) continue;
      const items = parseRSSItems(doc, journal.id);
      if (!items.length) continue;
      return items.slice(0, 10);
    } catch(e) { /* try next feed */ }
  }
  errors.push(journal.label);
  return [];
}

async function fetchAEAJournal(journal) {
  const url = `https://www.aeaweb.org/journals/app/search-results?ArticleSearch%5Bwithin%5D%5Barticletitle%5D=1&ArticleSearch%5Bwithin%5D%5Barticleabstract%5D=1&ArticleSearch%5Bwithin%5D%5Bauthorlast%5D=1&JelClass%5Bvalue%5D=0&journal=${journal.journalId}&ArticleSearch%5Bq%5D=`;
  try {
    const res = await fetch(proxyUrl(url));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();

    // Parse: #### [Title](url) followed by by Authors and ##### [Date](/issues/N)
    const items = [];
    // Match article blocks: title link, then authors line, then date
    const blockRe = /####\s+\[([^\]]+)\]\((https?:\/\/[^\)]+)\)\s*\n\nby ([^\n]+)\s*\n\n#####\s+\[([^\]]+)\]/g;
    let m;
    while ((m = blockRe.exec(html)) !== null) {
      items.push({
        id:      `${journal.id}-${m[2]}`,
        journalId: journal.id,
        journal,
        title:   m[1].trim(),
        link:    m[2].trim(),
        authors: m[3].trim(),
        dateStr: m[4].trim(),
        abstract: '',
      });
      if (items.length >= 10) break;
    }

    if (!items.length) throw new Error('No articles parsed from page');
    return items;
  } catch(e) {
    errors.push(`${journal.label}: ${e.message}`);
    return [];
  }
}

async function fetchNBER(journal) {
  const url = `https://www.nber.org/api/v1/working_page_listing/contentType/working_paper/?page=1&perPage=10&sortBy=public_date`;
  try {
    const res = await fetch(proxyUrl(url));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    // Response shape: { results: [ { title, url, authors: [{name}], publicationDate, abstract } ] }
    const papers = json.results || json.items || [];
    if (!papers.length) throw new Error('No results');
    return papers.slice(0, 10).map(p => ({
      id:        `nber-${p.url || p.slug || p.title}`,
      journalId: 'nber',
      journal,
      title:     p.title || '',
      link:      p.url ? (p.url.startsWith('http') ? p.url : `https://www.nber.org${p.url}`) : '',
      authors:   Array.isArray(p.authors)
                   ? p.authors.map(a => typeof a === 'string' ? a : a.name || a.lastName || '').filter(Boolean).join(', ')
                   : (p.authors || ''),
      dateStr:   p.publicationDate || p.publishDate || p.date || '',
      abstract:  p.abstract || p.description || '',
    }));
  } catch(e) {
    errors.push(`NBER: ${e.message}`);
    return [];
  }
}

async function fetchJournal(journal) {
  if (journal.type === 'aea')  return fetchAEAJournal(journal);
  if (journal.type === 'nber') return fetchNBER(journal);
  return fetchRSSJournal(journal);
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  loading     = true;
  allArticles = [];
  errors      = [];
  expandedId  = null;
  renderContainer();

  const results = await Promise.all(JOURNALS.map(j => fetchJournal(j)));
  results.forEach(items => allArticles.push(...items));

  // Shuffle randomly
  for (let i = allArticles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allArticles[i], allArticles[j]] = [allArticles[j], allArticles[i]];
  }

  loading = false;
  btn.classList.remove('spinning');
  document.getElementById('statusTs').textContent =
    'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  renderPills();
  renderContainer();
}

// ── Rendering ─────────────────────────────────────────────────
function renderPills() {
  const el = document.getElementById('filterPills');
  const pills = [{ id:'all', label:'All' }, ...JOURNALS];
  el.innerHTML = pills.map(j =>
    `<button class="pill ${activeFilter===j.id?'active':''}" onclick="setFilter('${j.id}')">${j.label}</button>`
  ).join('');
}

function setFilter(id) {
  activeFilter = id;
  expandedId   = null;
  renderPills();
  renderContainer();
}

function visibleArticles() {
  return activeFilter === 'all'
    ? allArticles
    : allArticles.filter(a => a.journalId === activeFilter);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff  = Date.now() - d.getTime();
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor(diff / 3600000);
  if (hours < 24) return `${hours}h ago`;
  if (days  < 14) return `${days}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function renderContainer() {
  const el = document.getElementById('articleContainer');

  if (loading) {
    el.innerHTML = `<div class="loading-wrap">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <div class="loading-msg">Fetching papers…</div>
    </div>`;
    document.getElementById('statusCount').textContent = '';
    return;
  }

  const articles = visibleArticles();
  document.getElementById('statusCount').textContent =
    `${articles.length} paper${articles.length !== 1 ? 's' : ''}${errors.length ? ` · ⚠ ${errors.join(', ')} unavailable` : ''}`;

  if (!articles.length) {
    el.innerHTML = `<div class="empty-msg">No papers found for this filter.</div>`;
    return;
  }

  el.innerHTML = `<div class="article-list">${articles.map(a => renderCard(a)).join('')}</div>`;
}

function renderCard(a) {
  const isOpen  = expandedId === a.id;
  const dateStr = formatDate(a.dateStr);
  const hasDOI  = a.link && (a.link.includes('doi.org') || a.link.includes('nber.org') || a.link.startsWith('http'));

  const abstractHtml = isOpen ? `
    <div class="abstract-panel open">
      <div class="abstract-inner">
        <div class="abstract-label">Abstract</div>
        <div class="abstract-text">${a.abstract || '<em style="color:var(--muted)">Abstract not available in feed — click the link below to read on the journal site.</em>'}</div>
        <div class="abstract-footer">
          ${hasDOI ? `<a class="abstract-link primary" href="${a.link}" target="_blank" rel="noopener">Read paper →</a>` : ''}
        </div>
      </div>
    </div>` : `<div class="abstract-panel"></div>`;

  return `<div class="article-card ${isOpen?'expanded':''}" onclick="toggleCard('${CSS.escape(a.id)}')">
    <div class="card-main">
      <div class="journal-pip" style="background:${a.journal.color}"></div>
      <div class="card-content">
        <div class="card-meta">
          <span class="journal-tag" style="background:${a.journal.bg};color:${a.journal.color}">${a.journal.label}</span>
          ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
        </div>
        <div class="card-title-text">${a.title}</div>
        ${a.authors ? `<div class="card-authors" style="margin-top:4px">${a.authors}</div>` : ''}
        <div class="card-expand-hint">
          <span class="arrow">▾</span>
          <span>${isOpen ? 'collapse' : 'expand abstract'}</span>
        </div>
      </div>
    </div>
    ${abstractHtml}
  </div>`;
}

function toggleCard(escapedId) {
  // un-escape the id
  const id = escapedId.replace(/\\(.)/g, '$1');
  expandedId = expandedId === id ? null : id;
  renderContainer();
  // scroll expanded card into view
  if (expandedId) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.article-card.expanded');
      if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

// ── Init ──────────────────────────────────────────────────────
renderPills();
renderContainer();
loadAll();
</script>
</body>
</html>
