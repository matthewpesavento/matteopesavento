name: Compile CV

on:
  push:
    paths:
      - 'professional/cv/**.tex'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install LaTeX (moderncv + dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-xetex

      - name: Compile main.tex to PDF
        working-directory: professional/cv
        run: |
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Move PDF to professional folder
        run: mv professional/cv/main.pdf professional/cv.pdf

      - name: Commit and push compiled PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add professional/cv.pdf
          git commit -m "Auto-compile CV [skip ci]" || echo "No changes to commit"
          git push
