name: Backfill Streams (one-time)

on:
  workflow_dispatch:   # manual trigger only, never scheduled

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour max, Strava rate limits may pause it
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Backfill streams
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/backfill_streams.py

      - name: Commit streams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/streams/
          git commit -m "chore: backfill activity streams" || echo "No changes"
          git pull --rebase origin main
          git push
