
<!DOCTYPE html>
<html>
<head>

<title>Training Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>My Training Dashboard</h1>

<canvas id="runChart" width="800" height="400"></canvas>

<script>

Papa.parse("training_data.csv", {
    download: true,
    header: true,
    complete: function(results) {

        let runs = results.data.filter(r => r.sport_type === "Run");

        let dates = runs.map(r => r.start_date);
        let distances = runs.map(r => r.distance / 1000);

        new Chart(document.getElementById("runChart"), {
            type: "bar",
            data: {
                labels: dates,
                datasets: [{
                    label: "Run Distance (km)",
                    data: distances
                }]
            }
        });

    }
});

</script>

</body>
</html>
